<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — DocTime</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── LAYOUT ─────────────────────────────────────────── */
    .dashboard {
      max-width: 1060px; margin: 0 auto;
      padding: 40px;
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 28px;
      align-items: start;
    }

    /* ── SIDEBAR ────────────────────────────────────────── */
    .sidebar {
      position: sticky; top: 80px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .profile-card {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 24px;
      text-align: center;
    }
    .profile-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      margin: 0 auto 14px;
      font-size: 24px;
    }
    .profile-name {
      font-family: 'Playfair Display', serif;
      font-size: 17px; font-weight: 700;
      margin-bottom: 4px;
    }
    .profile-role {
      font-size: 13px; color: var(--muted);
      margin-bottom: 14px;
    }
    .profile-meta { font-size: 13px; color: var(--muted); line-height: 1.8; }
    .profile-meta strong { color: var(--ink); font-weight: 600; }

    .side-nav { display: flex; flex-direction: column; gap: 4px; }
    .side-link {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .side-link svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }
    .side-link:hover, .side-link.active { background: var(--teal-lt); color: var(--teal); }
    .side-link.danger:hover { background: var(--danger-lt); color: var(--danger); }

    /* ── MAIN CONTENT ───────────────────────────────────── */
    .main { display: flex; flex-direction: column; gap: 24px; }

    /* STAT CARDS */
    .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
    .stat-card {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 20px;
    }
    .stat-card-label {
      font-size: 12px; font-weight: 600;
      color: var(--muted);
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .stat-card-icon {
      width: 38px; height: 38px;
      background: var(--teal-lt);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 12px;
    }
    .stat-card-icon svg { width: 18px; height: 18px; stroke: var(--teal); fill: none; stroke-width: 2; }
    .stat-card-icon.gold { background: var(--gold-lt); }
    .stat-card-icon.gold svg { stroke: var(--gold); }
    .stat-card-icon.info { background: var(--info-lt); }
    .stat-card-icon.info svg { stroke: var(--info); }
    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 30px; font-weight: 700;
      color: var(--ink);
    }

    /* APPOINTMENT LIST */
    .panel {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
    }
    .panel-head {
      padding: 20px 24px;
      border-bottom: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-head h3 { font-size: 16px; font-weight: 600; }
    .panel-body { padding: 8px 0; }

    /* FILTER TABS */
    .filter-tabs {
      display: flex; gap: 4px;
      padding: 4px;
      background: var(--surface);
      border-radius: var(--radius-sm);
    }
    .tab-btn {
      font-size: 13px; font-weight: 500;
      padding: 6px 14px;
      border-radius: 5px;
      color: var(--muted);
      transition: all .15s;
    }
    .tab-btn.active { background: var(--white); color: var(--ink); box-shadow: var(--shadow-sm); }

    /* APT ROW */
    .apt-row {
      display: flex; align-items: center; gap: 16px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--line);
      transition: background .15s;
    }
    .apt-row:last-child { border-bottom: none; }
    .apt-row:hover { background: var(--surface); }
    .apt-avatar { width: 44px; height: 44px; font-size: 14px; flex-shrink: 0; }
    .apt-info { flex: 1; min-width: 0; }
    .apt-name { font-size: 14px; font-weight: 600; }
    .apt-who { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .apt-time { text-align: right; flex-shrink: 0; }
    .apt-date { font-size: 13px; font-weight: 600; color: var(--ink-3); }
    .apt-hour { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .apt-actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* AVAILABILITY GRID */
    .avail-day {
      display: flex; align-items: center;
      padding: 14px 24px;
      border-bottom: 1px solid var(--line);
      gap: 16px;
    }
    .avail-day:last-child { border-bottom: none; }
    .avail-day-name { width: 100px; font-size: 13px; font-weight: 600; }
    .avail-slots { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; }
    .avail-slot-tag {
      font-size: 12px; font-weight: 500;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--teal-lt);
      color: var(--teal);
    }

    /* ADD AVAIL FORM */
    .add-avail-form {
      display: grid; grid-template-columns: 1fr auto auto auto; gap: 10px;
      align-items: end;
      padding: 16px 24px;
      border-top: 1px solid var(--line);
    }

    /* ── MOBILE ─────────────────────────────────────────── */
    @media (max-width: 860px) {
      .dashboard { grid-template-columns: 1fr; padding: 20px; }
      .sidebar { position: static; }
      .stats-row { grid-template-columns: repeat(2,1fr); }
    }
    @media (max-width: 480px) {
      .stats-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a class="nav-brand" href="index.html">
      <div class="nav-brand-mark"><svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></div>
      DocTime
    </a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="doctors.html" class="nav-link">Doctors</a>
      <a href="dashboard.html" class="nav-link active">Dashboard</a>
    </div>
    <div class="nav-actions">
      <span id="navName" style="font-size:14px;font-weight:600;color:var(--ink-3);"></span>
      <button class="btn-ghost btn-sm" onclick="logout()">Sign Out</button>
    </div>
  </nav>

  <div class="dashboard">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="profile-card">
        <div class="avatar profile-avatar av-teal" id="profileAvatar"></div>
        <div class="profile-name" id="profileName">—</div>
        <div class="profile-role" id="profileRole">—</div>
        <div class="divider"></div>
        <div class="profile-meta" id="profileMeta"></div>
      </div>

      <nav class="side-nav">
        <div class="side-link active" onclick="showTab('appointments')">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          Appointments
        </div>
        <div class="side-link" id="availLink" style="display:none;" onclick="showTab('availability')">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          Availability
        </div>
        <div class="side-link danger" onclick="logout()">
          <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sign Out
        </div>
      </nav>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <!-- STATS -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-card-icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          </div>
          <div class="stat-card-label">Total</div>
          <div class="stat-num" id="statTotal">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          </div>
          <div class="stat-card-label">Upcoming</div>
          <div class="stat-num" id="statUpcoming">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon gold">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="stat-card-label">Completed</div>
          <div class="stat-num" id="statCompleted">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon info">
            <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </div>
          <div class="stat-card-label" id="statOtherLabel">—</div>
          <div class="stat-num" id="statOther">—</div>
        </div>
      </div>

      <!-- APPOINTMENTS PANEL -->
      <div class="panel" id="appointmentsPanel">
        <div class="panel-head">
          <h3>My Appointments</h3>
          <div class="filter-tabs">
            <button class="tab-btn active" onclick="filterApt(this,'all')">All</button>
            <button class="tab-btn" onclick="filterApt(this,'scheduled')">Upcoming</button>
            <button class="tab-btn" onclick="filterApt(this,'completed')">Completed</button>
            <button class="tab-btn" onclick="filterApt(this,'cancelled')">Cancelled</button>
          </div>
        </div>
        <div class="panel-body" id="aptList">
          <div style="padding:40px;text-align:center;"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- AVAILABILITY PANEL (doctors only) -->
      <div class="panel" id="availPanel" style="display:none;">
        <div class="panel-head">
          <h3>My Availability</h3>
          <button class="btn-primary btn-sm" onclick="openModal('addSlot')">+ Add Slot</button>
        </div>
        <div class="panel-body" id="availList">
          <p style="padding:24px;color:var(--muted);font-size:14px;">No availability set yet.</p>
        </div>
      </div>
    </main>
  </div>

  <!-- ADD SLOT MODAL -->
  <div id="modal-addSlot" class="overlay" onclick="closeIfOverlay(event,'modal-addSlot')">
    <div class="modal">
      <div class="modal-head"><h3>Add Availability</h3><button class="modal-close" onclick="closeModal('addSlot')">✕</button></div>
      <div class="field">
        <label>Day of Week</label>
        <select id="availDay">
          <option value="0">Sunday</option><option value="1">Monday</option>
          <option value="2">Tuesday</option><option value="3">Wednesday</option>
          <option value="4">Thursday</option><option value="5">Friday</option><option value="6">Saturday</option>
        </select>
      </div>
      <div class="row">
        <div class="col field"><label>Start Time</label><input type="time" id="availStart"></div>
        <div class="col field"><label>End Time</label><input type="time" id="availEnd"></div>
      </div>
      <button class="btn-primary" style="width:100%;padding:12px;" onclick="saveSlot()">Save Slot</button>
    </div>
  </div>

  <!-- PRESCRIPTION MODAL -->
  <div id="modal-rx" class="overlay" onclick="closeIfOverlay(event,'modal-rx')">
    <div class="modal">
      <div class="modal-head"><h3>Add Prescription</h3><button class="modal-close" onclick="closeModal('rx')">✕</button></div>
      <input type="hidden" id="rxAptId">
      <div class="field"><label>Prescription Details</label>
        <textarea id="rxText" rows="5" placeholder="Medications, dosages, frequency…"></textarea>
      </div>
      <div class="field"><label>Additional Notes</label>
        <textarea id="rxNotes" rows="3" placeholder="Follow-up instructions, lifestyle advice…"></textarea>
      </div>
      <button class="btn-primary" style="width:100%;padding:12px;" onclick="saveRx()">Save Prescription</button>
    </div>
  </div>

  <!-- BOOKING MODAL -->
  <div id="modal-book" class="overlay" onclick="closeIfOverlay(event,'modal-book')">
    <div class="modal">
      <div class="modal-head"><h3>Book Appointment</h3><button class="modal-close" onclick="closeModal('book')">✕</button></div>
      <form onsubmit="submitBooking(event)">
        <div class="field"><label>Doctor</label><input type="text" id="bk-doctor" disabled></div>
        <div class="field"><label>Date</label><input type="date" id="bk-date" required></div>
        <div class="field"><label>Time</label><select id="bk-time" required><option value="">Select date first</option></select></div>
        <div class="field"><label>Symptoms (optional)</label><textarea id="bk-symptoms"></textarea></div>
        <button type="submit" class="btn-primary" style="width:100%;padding:12px;">Confirm</button>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/appointments.js"></script>
  <script>
    let currentUser = null;
    let allApts = [];
    let pendingSlots = [];

    document.addEventListener('DOMContentLoaded', () => {
      const token = getToken();
      if (!token) { window.location.href = 'index.html'; return; }
      currentUser = getUser();
      if (!currentUser) { window.location.href = 'index.html'; return; }
      initDashboard();
    });

    function initDashboard() {
      // Profile
      const av = document.getElementById('profileAvatar');
      const init = initials(currentUser.name);
      av.textContent = init;
      av.classList.add(avClass(0));
      document.getElementById('profileName').textContent = currentUser.name;
      document.getElementById('profileRole').textContent = currentUser.role === 'doctor' ? '🩺 Doctor' : '🙋 Patient';
      document.getElementById('navName').textContent = currentUser.name.split(' ')[0];
      document.getElementById('profileMeta').innerHTML = `
        <div>${currentUser.email}</div>
        ${currentUser.specialization ? `<div><strong>${currentUser.specialization}</strong></div>` : ''}
        <div>Member since ${formatDate(currentUser.created_at || Date.now())}</div>
      `;

      if (currentUser.role === 'doctor') {
        document.getElementById('availLink').style.display = 'flex';
      }

      loadAppointments();
    }

    async function loadAppointments() {
      try {
        const res = await fetch(`${API_URL}/appointments/my-appointments`, {
          headers: authHeader()
        });
        if (res.status === 401) { window.location.href = 'index.html'; return; }
        if (res.ok) {
          allApts = await res.json();
          renderStats();
          renderApts(allApts);
          if (currentUser.role === 'doctor') loadAvailability();
        }
      } catch {
        document.getElementById('aptList').innerHTML = `
          <div class="empty-state"><div class="icon">⚠️</div><h4>Could not load appointments</h4><p>Check that the backend server is running.</p></div>`;
      }
    }

    function renderStats() {
      const total     = allApts.length;
      const upcoming  = allApts.filter(a => a.status === 'scheduled').length;
      const completed = allApts.filter(a => a.status === 'completed').length;
      document.getElementById('statTotal').textContent     = total;
      document.getElementById('statUpcoming').textContent  = upcoming;
      document.getElementById('statCompleted').textContent = completed;

      if (currentUser.role === 'doctor') {
        const patients = new Set(allApts.map(a => a.patient_id)).size;
        document.getElementById('statOtherLabel').textContent = 'Patients';
        document.getElementById('statOther').textContent = patients;
      } else {
        const doctors = new Set(allApts.map(a => a.doctor_id)).size;
        document.getElementById('statOtherLabel').textContent = 'Doctors';
        document.getElementById('statOther').textContent = doctors;
      }
    }

    function renderApts(apts) {
      const el = document.getElementById('aptList');
      if (!apts.length) {
        el.innerHTML = `<div class="empty-state">
          <div class="icon">📅</div>
          <h4>No appointments found</h4>
          <p>Book your first appointment to get started.</p>
          <a href="doctors.html" class="btn-primary" style="display:inline-block;margin-top:16px;">Find a Doctor</a>
        </div>`;
        return;
      }
      el.innerHTML = apts.map((a, i) => {
        const other = currentUser.role === 'patient' ? a.doctor_name : a.patient_name;
        const otherLabel = currentUser.role === 'patient' ? 'Doctor' : 'Patient';
        const statusMap = { scheduled:'badge-avail', completed:'badge-done', cancelled:'badge-cancelled', pending:'badge-pending' };
        return `
        <div class="apt-row">
          <div class="avatar apt-avatar ${avClass(i)}">${initials(other||'?')}</div>
          <div class="apt-info">
            <div class="apt-name">${other || '—'}</div>
            <div class="apt-who">${otherLabel}</div>
          </div>
          <div style="flex:1;padding:0 12px;">
            <span class="badge ${statusMap[a.status]||'badge-pending'}">${a.status}</span>
            ${a.symptoms ? `<div style="font-size:12px;color:var(--muted);margin-top:4px;">${a.symptoms.substring(0,60)}</div>` : ''}
          </div>
          <div class="apt-time">
            <div class="apt-date">${a.date}</div>
            <div class="apt-hour">${a.time}</div>
          </div>
          <div class="apt-actions">
            ${a.status === 'scheduled' ? `
              <button class="btn-primary btn-sm" onclick="joinVideoCall('${a.meeting_id}')">
                ▶ Join
              </button>
              <button class="btn-danger btn-sm" onclick="cancelAppointment(${a.id});setTimeout(loadAppointments,600)">
                Cancel
              </button>
            ` : ''}
            ${a.status === 'scheduled' && currentUser.role === 'doctor' ? `
              <button class="btn-gold btn-sm" onclick="doComplete(${a.id})">Complete</button>
            ` : ''}
            <button class="btn-ghost btn-sm" onclick="viewDetails(${a.id})">Details</button>
          </div>
        </div>`;
      }).join('');
    }

    function filterApt(btn, status) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderApts(status === 'all' ? allApts : allApts.filter(a => a.status === status));
    }

    function viewDetails(id) {
      const a = allApts.find(x => x.id === id);
      if (!a) return;
      alert(`Appointment Details\n─────────────────\n` +
        `${currentUser.role==='patient'?'Doctor':'Patient'}: ${currentUser.role==='patient'?a.doctor_name:a.patient_name}\n` +
        `Date: ${a.date}\nTime: ${a.time}\nStatus: ${a.status}\n` +
        `Symptoms: ${a.symptoms||'N/A'}\nPrescription: ${a.prescription||'Not prescribed yet'}`);
    }

    async function doComplete(id) {
      if (!confirm('Mark as completed?')) return;
      const res = await fetch(`${API_URL}/appointments/${id}/status`, {
        method: 'PUT', headers: authHeader(), body: JSON.stringify({ status: 'completed' })
      });
      if (res.ok) {
        showToast('Marked as completed', 'success');
        loadAppointments();
        document.getElementById('rxAptId').value = id;
        openModal('rx');
      } else { showToast('Failed to update', 'error'); }
    }

    async function saveRx() {
      showToast('Prescription saved', 'success');
      closeModal('rx');
    }

    // ── AVAILABILITY ──────────────────────────────────────
    function showTab(tab) {
      document.querySelectorAll('.side-link').forEach(l => l.classList.remove('active'));
      event?.currentTarget?.classList.add('active');
      document.getElementById('appointmentsPanel').style.display = tab === 'appointments' ? '' : 'none';
      document.getElementById('availPanel').style.display = tab === 'availability' ? '' : 'none';
    }

    async function loadAvailability() {
      try {
        const res = await fetch(`${API_URL}/doctors/${currentUser.id}/availability`);
        if (res.ok) {
          const avail = await res.json();
          renderAvail(avail);
        }
      } catch { }
    }

    function renderAvail(avail) {
      const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const el = document.getElementById('availList');
      if (!avail.length) {
        el.innerHTML = '<p style="padding:24px;color:var(--muted);font-size:14px;">No availability configured.</p>';
        return;
      }
      const grouped = {};
      avail.forEach(a => {
        const d = days[a.day_of_week];
        if (!grouped[d]) grouped[d] = [];
        grouped[d].push(`${formatTime(a.start_time)} – ${formatTime(a.end_time)}`);
      });
      el.innerHTML = Object.entries(grouped).map(([day, slots]) => `
        <div class="avail-day">
          <div class="avail-day-name">${day}</div>
          <div class="avail-slots">
            ${slots.map(s => `<span class="avail-slot-tag">${s}</span>`).join('')}
          </div>
        </div>
      `).join('');
    }

    async function saveSlot() {
      const day   = document.getElementById('availDay').value;
      const start = document.getElementById('availStart').value;
      const end   = document.getElementById('availEnd').value;
      if (!start || !end) { showToast('Select start and end time', 'error'); return; }
      try {
        const res = await fetch(`${API_URL}/doctors/availability`, {
          method: 'POST', headers: authHeader(),
          body: JSON.stringify({ doctorId: currentUser.id, availability: [{ dayOfWeek: parseInt(day), startTime: start, endTime: end }] })
        });
        if (res.ok) {
          showToast('Availability saved', 'success');
          closeModal('addSlot');
          loadAvailability();
        } else { showToast('Failed to save', 'error'); }
      } catch { showToast('Network error', 'error'); }
    }
  </script>
</body>
</html>
